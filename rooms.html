<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title data-i18n="title">Rooms</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
  <div class="container">
    <a href="index.html" class="logo">
      <img src="assets/images/logo.png" alt="Oceanview Hotel Logo">
    </a>
    <nav>
      <ul>
        <li><a href="index.html" data-i18n="nav.home">Home</a></li>
        <li><a href="rooms.html" data-i18n="nav.rooms">Rooms</a></li>
        <li><a href="about.html" data-i18n="nav.about">About Us</a></li>
        <li><a href="features.html" data-i18n="nav.features">Hotel Features</a></li>
        <li><a href="contact.html" data-i18n="nav.contact">Contact</a></li>
      </ul>
    </nav>
    <select id="langSwitcher">
      <option value="en">EN</option>
      <option value="uk">UK</option>
    </select>
  </div>
</header>

<section class="featured">
  <h2 data-i18n="rooms.title">Our Rooms</h2>

  <div class="product-grid">

    <div class="product-card">
      <img src="assets/images/en/hotel_room1.jpg" data-i18n-img="room1.img" alt="Standard Room">
      <h3 data-i18n="room1.name">Standard Room</h3>
      <p data-i18n="room1.desc"></p>
      <p class="price" data-i18n="room1.price"></p>
      <p class="sizes" data-i18n="room1.meta"></p>
    </div>

    <div class="product-card">
      <img src="assets/images/en/hotel_room2.jpg" data-i18n-img="room2.img" alt="Deluxe Room">
      <h3 data-i18n="room2.name">Deluxe Room</h3>
      <p data-i18n="room2.desc"></p>
      <p class="price" data-i18n="room2.price"></p>
      <p class="sizes" data-i18n="room2.meta"></p>
    </div>

    <div class="product-card">
      <img src="assets/images/en/hotel_room3.jpg" data-i18n-img="room3.img" alt="Suite">
      <h3 data-i18n="room3.name">Suite</h3>
      <p data-i18n="room3.desc"></p>
      <p class="price" data-i18n="room3.price"></p>
      <p class="sizes" data-i18n="room3.meta"></p>
    </div>

  </div>
</section>

<script src="app.js"></script>
</body>
</html>
