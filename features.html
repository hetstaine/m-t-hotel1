<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

</head>
<body>

<header class="navbar">
  <div class="container">
    <a href="index.html" class="logo">
      <img src="assets/images/logo.png" alt="Oceanview Hotel Logo">
    </a>
    <nav>
      <ul>
        <li><a href="index.html" data-i18n="nav.home">Home</a></li>
        <li><a href="rooms.html" data-i18n="nav.rooms">Rooms</a></li>
        <li><a href="about.html" data-i18n="nav.about">About Us</a></li>

      <p data-i18n="feature2.desc"></p>
